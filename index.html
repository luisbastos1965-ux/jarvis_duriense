<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quinta do Paraíso | Assistente</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
</head>
<body class="idle">

    <header class="app-header">
        <span id="ui-title">Quinta do Paraíso</span>
        <select id="lang-select" class="lang-switcher">
            <option value="pt">🇵🇹 PT</option>
            <option value="en">🇬🇧 EN</option>
            <option value="es">🇪🇸 ES</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="de">🇩🇪 DE</option>
        </select>
    </header>

    <main class="app-main">
        <div class="ai-container" id="ai-container">
            <div class="ai-orb" id="orb"></div>
        </div>

        <div id="ui-elements" class="ui-wrapper">
            <div class="chat-display">
                <p id="ai-response"></p>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Escreva ou fale connosco..." autocomplete="off">
                <button id="btn-mic" class="btn-action">🎤</button>
                <button id="btn-send" class="btn-action">➤</button>
            </div>

            <div class="topics-wrapper">
                <button id="btn-topics" class="btn-topics-main">Tópicos Rápidos ⚡</button>
                <div id="topics-list" class="hidden">
                    
                    <div class="topic-category">
                        <h4 id="cat-stay">Alojamento</h4>
                        <div class="topic-group">
                            <button class="chip" id="chip-wifi" onclick="askDirect('wifi')">🔑 Wi-Fi</button>
                            <button class="chip" id="chip-pool" onclick="askDirect('piscina')">🏊 Piscina</button>
                            <button class="chip" id="chip-checkout" onclick="askDirect('check-out')">📅 Check-out</button>
                        </div>
                    </div>

                    <div class="topic-category">
                        <h4 id="cat-exp">Experiências</h4>
                        <div class="topic-group">
                            <button class="chip" id="chip-breakfast" onclick="askDirect('pequeno-almoço')">☕ Pequeno-almoço</button>
                            <button class="chip" id="chip-restaurant" onclick="askDirect('restaurante')">🍽️ Restaurante</button>
                            <button class="chip" id="chip-activities" onclick="askDirect('atividades')">🍇 Atividades</button>
                            <button class="chip" id="chip-spa" onclick="askDirect('spa')">🧖‍♀️ Spa</button>
                        </div>
                    </div>

                    <div class="topic-category">
                        <h4 id="cat-help">Assistência</h4>
                        <div class="topic-group">
                            <button class="chip" id="chip-reception" onclick="askDirect('receção')">🛎️ Receção</button>
                            <button class="chip" id="chip-transport" onclick="askDirect('transporte')">🚕 Transportes</button>
                            <button class="chip" id="chip-pharmacy" onclick="askDirect('farmácia')">💊 Farmácia</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
