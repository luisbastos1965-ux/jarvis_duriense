<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Concierge IA | Quinta do Paraíso</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Regista o Service Worker para permitir Instalação -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
</head>
<body>

    <header class="app-header">
        <span>Quinta do Paraíso</span>
    </header>

    <main class="app-main">
        <div class="ai-container" id="ai-container">
            <div class="ai-orb" id="orb"></div>
        </div>

        <!-- Tudo isto arranca escondido -->
        <div id="ui-elements" class="hidden">
            <div class="chat-display">
                <p id="ai-response">Olá. Bem-vindo à Quinta do Paraíso. Sou o seu assistente pessoal. Em que posso ajudar?</p>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Escreva ou fale connosco..." autocomplete="off">
                <button id="btn-mic" class="btn-action">🎤</button>
                <button id="btn-send" class="btn-action">➤</button>
            </div>

            <div class="topics-wrapper">
                <button id="btn-topics" class="btn-topics-main">Tópicos Rápidos ⚡</button>
                <div id="topics-list" class="hidden">
                    <button class="chip" onclick="askDirect('Wi-Fi')">🔑 Wi-Fi</button>
                    <button class="chip" onclick="askDirect('Pequeno-almoço')">☕ Pequeno-almoço</button>
                    <button class="chip" onclick="askDirect('Receção')">🛎️ Receção</button>
                    <button class="chip" onclick="askDirect('Restaurante')">🍽️ Restaurante</button>
                    <button class="chip" onclick="askDirect('Atividades')">🍇 Atividades</button>
                    <button class="chip" onclick="askDirect('Piscina')">🏊 Piscina</button>
                    <button class="chip" onclick="askDirect('Check-out')">📅 Check-out</button>
                    <button class="chip" onclick="askDirect('Farmácia')">💊 Farmácia</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
